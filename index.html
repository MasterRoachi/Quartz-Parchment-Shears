<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartz, Parchment, Shears</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main class="game">
        <section class="game-name">
            <img src="./images/heading.png">
        </section>
        <section class="scoreboard">
            <div class="info">
                <div class="score">
                    <p id="com">COM: </p>
                    <span id="computer-score"> 0</span>
                </div>
                <div class="score">
                    <p id="player">PLAYER: </p>
                    <span id="human-score"> 0</span>
                </div>
            </div>
            <div class="results"> 
            <p id="round-result"></p>
            </div>
        </section>
        <section class="choices">
            <button class="quartz choice">
                <img src="./images/Quartz.png">
            </button>
            <button class="parchment choice">
                <img src="./images/Parchment.png">
            </button>
            <button class="shears choice">
                <img src="./images/Shears.png">
            </button>
        </section>

    </main>
    <script src="./script.js"></script>
</body>

</html>
